<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>kvk</title>
<style>
    body {
    		text-allign: center;
    		font-family: Arial;
    		margin-top: 100px;
    }
    button {
    		padding: 15px 30px;
    		font-size: 18px;
    		margin: 10px;
    		cursor: pointer;
    		position: relative;
    }
    #emoji {
    		 font-size: 60px;
    		 margin-top: 20px
    }
 </style>
 </head>
 <body>
 
 <h1>ben je voor kortrijk?</h1>
 
 <button onclick="jaklik()">Ja 😍</button>
 <button id="neeBtn" onclick="verplaatsNee()">Nee 😓</button>
 		     

 <div id="emoji"></div>
 
 <script>
 function jaklik() {
		  document.getElementById("emoji").innerHTML = "❤️🤍";
	}
	
	function verplaatsNee() {
		  let knop = document.getElementById("neeBtn");
		  
		  let x = Math.random() * (window.innerWidth - knop.offsetWidth);
		  let y = Math.random() * (window.innerHeight - knop.offsetHeight);
		  
		  knop.style.position = "absolute";
		  knop.style.left = x + "px";
		  knop.style.top = y + "px";
		  
		  document.getElementById("emoji").innerHTML = "😓";
}
</script>
